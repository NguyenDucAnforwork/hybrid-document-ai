# Horizontal Pod Autoscaler — autoscale OCR workers by queue depth (custom metric).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docai-api
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: docai-api}
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Pods
      pods:
        metric: {name: queue_size}
        target: {type: AverageValue, averageValue: "20"}
    - type: Resource
      resource: {name: cpu, target: {type: Utilization, averageUtilization: 70}}
