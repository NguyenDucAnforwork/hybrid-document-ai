# Runnable local production stack.
# Usage: docker compose up
# Prerequisites: set DOCAI_WORKSPACE env var (path with model artifacts)
#
# KServe / Triton / vLLM: cloud/k8s targets only — not in this stack.
# VLM fallback: disabled by default (set DOCAI_VLM_MODE=api + VLM_API_BASE for Modal).

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DOCAI_WORKSPACE: /workspace
      DOCAI_VLM_MODE: ${DOCAI_VLM_MODE:-disabled}
      VLM_API_BASE: ${VLM_API_BASE:-}
      VLM_API_KEY: ${VLM_API_KEY:-}
      DOCAI_QUEUE_BACKEND: redis
      DOCAI_QUEUE_URL: redis://redis:6379
    volumes:
      - ${DOCAI_WORKSPACE:-/tmp/docai-ws}:/workspace:ro
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
