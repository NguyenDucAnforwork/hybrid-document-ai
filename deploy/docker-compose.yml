# Production target topology (Deployment Layer). Swap-by-config from app.yaml.
# Not run on the dev box (no docker engine); documents the production shape.
services:
  api:
    build: {context: .., dockerfile: deploy/Dockerfile}
    ports: ["8000:8000"]
    environment:
      DOCAI_VLM_MODE: api
      VLM_API_BASE: http://vllm:8000/v1
    depends_on: [redis, minio]
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment: {MINIO_ROOT_USER: minio, MINIO_ROOT_PASSWORD: minio123}
  # OCR served via Triton (ONNX models drop-in); optional GPU VLM via vLLM.
  triton:
    image: nvcr.io/nvidia/tritonserver:24.09-py3
    command: ["tritonserver", "--model-repository=/models"]
    volumes: ["./serving/triton/model_repository:/models"]
    ports: ["8001:8001"]
  vllm:
    image: vllm/vllm-openai:latest
    command: ["--model", "Qwen/Qwen2.5-VL-7B-Instruct", "--gpu-memory-utilization", "0.9"]
    ports: ["8000"]
    deploy: {resources: {reservations: {devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]}}}
  prometheus:
    image: prom/prometheus
    ports: ["9090:9090"]
